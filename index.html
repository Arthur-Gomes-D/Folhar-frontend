<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <title>Folhar</title>
</head>

<body>
    <nav>
        <div id="icone">
            <img src="img/icone.png" alt="icone da folhar">
            <p>FOLHEAR</p>
        </div>
        <div>
            <form id="barraDePesquisa" action="">
                <button class="butaoDePesquisa"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                    </svg></button>

                <textarea name="" id="barraDePesquisaAreaDeTexto"></textarea>

            </form>
        </div>
        <div class="iconesNav">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-person-circle" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                <path fill-rule="evenodd"
                    d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
            </svg>
            <a href="">Home</a>
        </div>
    </nav>
    <main>
        <div class="textosDeLogin">
            <div class="textosEBotoes">
                <h2>Sobre<br>Nós:</h2>
                <p>A folhear é um sistema de gerenciamento de empréstimos focado na experiência do usuário e na
                    autonomia do leitor. O objetivo é transformar a biblioteca física em um catálogo dinâmico e
                    acessível de qualquer dispositivo.</p>
                <div class="botoes">
                    <button class="logar">Logar</button>
                    <button class="Cadastrar">Cadastrar</button>
                </div>
            </div>
            <div class="images">
                <img src="img/pagina de login/paulof.png" alt="image em preto e branco de paulo freire">
            </div>
        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
